<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Đầu Tiên Của Nhật</title>
    <style>
        /* Thêm một chút CSS cho đẹp nhé */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            padding: 50px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 { color: #007bff; }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Chào mừng đến với GitHub Pages!</h1>
        <p>Đây là trang web đầu tiên của <strong>Nguyễn Minh Nhật</strong>.</p>
        <p>Học lập trình thật thú vị, đúng không?</p>
        
        <button onclick="chaoMung()">Bấm vào đây!</button>
    </div>

    <script>
        function chaoMung() {
            alert("Chào Nhật! Chúc bạn học HTML/CSS/JS thật tốt nhé!");
        }
    </script>

</body>
</html>
