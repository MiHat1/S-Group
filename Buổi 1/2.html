<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web đầu tiên</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Xin chào 👋</h1>
    <p>Đây là trang HTML cơ bản.</p>

    <button onclick="sayHello()">Bấm vào đây</button>

    <script>
        function sayHello() {
            alert("Hello từ JavaScript!");
        }
    </script>

</body>
</html>
